server:
  port: 8081

spring:
  application:
    name: user-service
  config:
    import:
      - optional:nacos:user-service.yaml
      - optional:nacos:application.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/users_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=${MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=UTC
    username: ${MYSQL_USER:judgemesh}
    password: ${MYSQL_PASSWORD:judgemesh}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# Seata is wired but disabled by default for local development.
seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: judgemesh-tx-group

judgemesh:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-32-bytes}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
