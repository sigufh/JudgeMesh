spring:
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    config:
      import-check:
        enabled: false
    service-registry:
      auto-registration:
        enabled: false
    discovery:
      enabled: false
  config:
    import: []

judgemesh:
  dispatcher:
    listener-enabled: false

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
