spring:
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    config:
      import-check:
        enabled: false
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes: []
  config:
    import: []

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
