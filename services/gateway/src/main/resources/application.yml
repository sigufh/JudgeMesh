server:
  port: 8080

spring:
  application:
    name: gateway
  config:
    import:
      - optional:nacos:gateway.yaml
      - optional:nacos:application.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/user/**, /api/auth/**, /api/users/**
            - id: problem-service
              uri: lb://problem-service
              predicates:
                - Path=/api/problem/**, /api/problems/**
            - id: submit-service
              uri: lb://submit-service
              predicates:
                - Path=/api/submit/**, /api/submits/**, /api/contest/**, /api/contests/**, /api/rank/**, /ws/**

judgemesh:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-32-bytes}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
