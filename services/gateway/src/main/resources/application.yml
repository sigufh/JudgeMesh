server:
  port: 8080

spring:
  application:
    name: gateway
  config:
    import:
      - optional:nacos:gateway.yaml
      - optional:nacos:application.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
      eager: true
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/user/**, /api/auth/**, /api/users/**
            - id: problem-service
              uri: lb://problem-service
              predicates:
                - Path=/api/problem/**, /api/problems/**
            - id: submit-service
              uri: lb://submit-service
              predicates:
                - Path=/api/submit/**, /api/submits/**, /api/contest/**, /api/contests/**, /api/rank/**
            - id: submit-service-ws
              uri: lb:ws://submit-service
              predicates:
                - Path=/ws, /ws/**
            - id: judge-dispatcher-admin
              uri: lb://judge-dispatcher
              predicates:
                - Path=/api/admin/dispatcher/**, /admin/dispatcher/**

judgemesh:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-32-bytes}
  gateway:
    submit-limit-per-minute: ${SUBMIT_LIMIT_PER_MINUTE:30}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
