server:
  port: 8082

spring:
  application:
    name: problem-service
  config:
    import:
      - optional:nacos:problem-service.yaml
      - optional:nacos:application.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
      eager: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/problems_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:judgemesh}
    password: ${MYSQL_PASSWORD:judgemesh}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    testcases: testcases
    avatars: avatars
    backups: backups

judgemesh:
  problem:
    seed-placeholder-enabled: ${PROBLEM_SEED_PLACEHOLDER_ENABLED:false}
    cache:
      max-size: ${PROBLEM_CACHE_MAX_SIZE:2000}
      detail-ttl-seconds: ${PROBLEM_CACHE_DETAIL_TTL_SECONDS:300}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
