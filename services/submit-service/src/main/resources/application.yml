server:
  port: 8083

spring:
  application:
    name: submit-service
  config:
    import:
      - optional:nacos:submit-service.yaml
      - optional:nacos:application.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/submits_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=${MYSQL_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=UTC
    username: ${MYSQL_USER:judgemesh}
    password: ${MYSQL_PASSWORD:judgemesh}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:judgemesh}
    password: ${RABBITMQ_PASSWORD:judgemesh}
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

judgemesh:
  mq:
    submit-queue: submit.queue
    submit-exchange: judgemesh.exchange
    retry-queue: submit.retry.queue
    dead-queue: submit.dlq
    submit-routing-key: judge.task
    retry-routing-key: judge.retry
    dead-routing-key: judge.dead
    retry-delay-ms: ${SUBMIT_RETRY_DELAY_MS:5000}
  leaderboard:
    redis-key-prefix: leaderboard
  submit:
    callback-url: ${SUBMIT_CALLBACK_URL:http://submit-service:8083/api/submit/internal/result}
  problem:
    base-url: ${PROBLEM_SERVICE_URL:http://127.0.0.1:8082}

seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: judgemesh-tx-group

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
