apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/namespaces
  - ../../base/app-secrets
  - ../../base/infra-app-secrets
  - ../../base/infra-secrets
  - ../../base/nacos
  - ../../base/mysql
  - ../../base/minio
  - ../../base/redis
  - ../../base/rabbitmq
  - ../../base/etcd
  - ../../base/ingress-nginx
  - ../../base/grafana-dashboards
  - ../../base/gateway
  - ../../base/user-service
  - ../../base/problem-service
  - ../../base/submit-service
  - ../../base/judge-dispatcher
  - ../../base/judge-worker
  - ../../base/frontend
  - ../../base/ingress

images:
  - name: docker.io/judgemesh/judgemesh-gateway
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/judgemesh-gateway
    newTag: latest
  - name: docker.io/judgemesh/judgemesh-user-service
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/judgemesh-user-service
    newTag: latest
  - name: docker.io/judgemesh/judgemesh-problem-service
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/judgemesh-problem-service
    newTag: latest
  - name: docker.io/judgemesh/judgemesh-submit-service
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/judgemesh-submit-service
    newTag: latest
  - name: docker.io/judgemesh/judgemesh-judge-dispatcher
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/judgemesh-judge-dispatcher
    newTag: latest
  - name: docker.io/judgemesh/judge-worker
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/judge-worker
    newTag: latest
  - name: docker.io/judgemesh/frontend
    newName: asia-east1-docker.pkg.dev/project-ad762830-bf41-4f10-b00/judgemesh/frontend
    newTag: latest

patches:
  - target: { kind: Ingress, name: oj-ingress, namespace: judgemesh }
    patch: |
      - op: remove
        path: /spec/rules/0/host
  - target: { kind: Deployment, name: gateway }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
  - target: { kind: Deployment, name: user-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
  - target: { kind: Deployment, name: problem-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
  - target: { kind: Deployment, name: submit-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
  - target: { kind: Deployment, name: frontend }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 25m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
  - target: { kind: Deployment, name: judge-dispatcher }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
  - target: { kind: Deployment, name: judge-worker }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: role
                      operator: In
                      values: [judge]
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app: judge-worker
                topologyKey: kubernetes.io/hostname
  - target: { kind: StatefulSet, name: etcd }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
  - target: { kind: StatefulSet, name: mysql }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 150m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
  - target: { kind: StatefulSet, name: minio }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
  - target: { kind: StatefulSet, name: nacos }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "false"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 150m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: add
        path: /spec/template/spec/containers/0/startupProbe
        value:
          httpGet:
            path: /nacos/actuator/health
            port: 8848
          periodSeconds: 10
          failureThreshold: 30
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 90
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe/periodSeconds
        value: 10
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe/failureThreshold
        value: 12
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 180
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe/periodSeconds
        value: 20
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 6
  - target: { kind: StatefulSet, name: redis }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
  - target: { kind: StatefulSet, name: rabbitmq }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { role: app }
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
