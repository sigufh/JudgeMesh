apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
  namespace: judgemesh-infra
  labels:
    app: nacos
spec:
  serviceName: nacos-headless
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /nacos/actuator/prometheus
        prometheus.io/port: "8848"
    spec:
      containers:
        - name: nacos
          image: docker.io/nacos/nacos-server:v2.4.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8848
              name: http
            - containerPort: 9848
              name: grpc
          env:
            - name: MODE
              value: standalone
            - name: NACOS_AUTH_ENABLE
              value: "true"
            - name: NACOS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: judgemesh-infra-secrets
                  key: nacos-auth-token
            - name: NACOS_AUTH_IDENTITY_KEY
              value: serverIdentity
            - name: NACOS_AUTH_IDENTITY_VALUE
              valueFrom:
                secretKeyRef:
                  name: judgemesh-infra-secrets
                  key: nacos-identity-value
            - name: NACOS_NAMESPACE
              value: judgemesh-dev
            - name: JVM_XMS
              value: 512m
            - name: JVM_XMX
              value: 512m
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /nacos/actuator/health
              port: 8848
            initialDelaySeconds: 30
          livenessProbe:
            httpGet:
              path: /nacos/actuator/health
              port: 8848
            initialDelaySeconds: 60
          volumeMounts:
            - name: data
              mountPath: /home/nacos/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: judgemesh-infra
spec:
  selector:
    app: nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
    - name: grpc
      port: 9848
      targetPort: 9848
---
apiVersion: v1
kind: Service
metadata:
  name: nacos-headless
  namespace: judgemesh-infra
spec:
  clusterIP: None
  selector:
    app: nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
    - name: grpc
      port: 9848
      targetPort: 9848
