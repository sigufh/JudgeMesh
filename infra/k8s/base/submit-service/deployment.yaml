apiVersion: apps/v1
kind: Deployment
metadata:
  name: submit-service
  namespace: judgemesh
  labels: { app: submit-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: submit-service }
  template:
    metadata:
      labels: { app: submit-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: app
          image: docker.io/judgemesh/judgemesh-submit-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8083, name: http }
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: prod }
            - { name: NACOS_ADDR, value: nacos.judgemesh-infra.svc:8848 }
            - { name: MYSQL_HOST, value: mysql.judgemesh-infra.svc }
            - { name: REDIS_HOST, value: redis.judgemesh-infra.svc }
            - { name: RABBITMQ_HOST, value: rabbitmq.judgemesh-infra.svc }
            - { name: SUBMIT_CALLBACK_URL, value: http://submit-service.judgemesh.svc:8083/api/submit/internal/result }
          envFrom:
            - secretRef: { name: judgemesh-secrets }
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8083 }
            initialDelaySeconds: 30
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: submit-service
  namespace: judgemesh
spec:
  selector: { app: submit-service }
  ports:
    - { port: 8083, targetPort: 8083, name: http }
