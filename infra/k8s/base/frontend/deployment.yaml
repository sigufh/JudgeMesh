apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: judgemesh
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: nginx
          image: docker.io/judgemesh/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 80, name: http }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: judgemesh
spec:
  selector: { app: frontend }
  ports:
    - { port: 80, targetPort: 80, name: http }
