apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: judgemesh-infra
  labels:
    app: etcd
spec:
  serviceName: etcd-headless
  replicas: 3
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "2381"
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.17
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/etcd
          args:
            - --name=$(POD_NAME)
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://$(POD_NAME).etcd-headless.judgemesh-infra.svc:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://$(POD_NAME).etcd-headless.judgemesh-infra.svc:2380
            - --initial-cluster=etcd-0=http://etcd-0.etcd-headless.judgemesh-infra.svc:2380,etcd-1=http://etcd-1.etcd-headless.judgemesh-infra.svc:2380,etcd-2=http://etcd-2.etcd-headless.judgemesh-infra.svc:2380
            - --initial-cluster-state=new
            - --listen-metrics-urls=http://0.0.0.0:2381
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
            - containerPort: 2381
              name: prom
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 15
          livenessProbe:
            tcpSocket:
              port: 2379
            initialDelaySeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: judgemesh-infra
spec:
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: prom
      port: 2381
      targetPort: 2381
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: judgemesh-infra
spec:
  clusterIP: None
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
