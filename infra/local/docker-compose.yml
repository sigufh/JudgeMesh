# JudgeMesh 本地中间件 · 一键起 6 件套
# 用法:
#   cp infra/local/.env.example infra/local/.env
#   docker compose -f infra/local/docker-compose.yml --env-file infra/local/.env up -d
# 销毁:
#   docker compose -f infra/local/docker-compose.yml down -v

name: judgemesh-local

networks:
  judgemesh-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  etcd-data:
  nacos-data:

services:
  # ─── MySQL 8 · 一实例三库 ─────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: jm-mysql
    restart: unless-stopped
    networks: [judgemesh-net]
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_USER: ${MYSQL_USER:-judgemesh}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-judgemesh}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: jm-redis
    restart: unless-stopped
    networks: [judgemesh-net]
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ─── RabbitMQ 3.13 + 管理面板 ────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: jm-rabbitmq
    restart: unless-stopped
    networks: [judgemesh-net]
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # 管理面板
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-judgemesh}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-judgemesh}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 10

  # ─── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: jm-minio
    restart: unless-stopped
    networks: [judgemesh-net]
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # 控制台
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 10

  # ─── MinIO 自动建桶 ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: jm-minio-init
    networks: [judgemesh-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb -p local/testcases || true;
      mc mb -p local/avatars   || true;
      mc mb -p local/backups   || true;
      echo 'minio buckets ready';
      "

  # ─── etcd 3.5(单节点) ──────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: jm-etcd
    restart: unless-stopped
    networks: [judgemesh-net]
    ports: ["2379:2379"]
    command:
      - /usr/local/bin/etcd
      - --name=jm-etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=jm-etcd=http://etcd:2380
      - --initial-cluster-state=new
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      retries: 10

  # ─── Nacos 3.x · 单机 standalone ─────────────────────────────
  # ⚠️ Nacos 3 的 derby 嵌入模式仅供本地;集群部署见 docs/design/08-部署架构.md
  nacos:
    image: nacos/nacos-server:v3.0.1
    container_name: jm-nacos
    restart: unless-stopped
    networks: [judgemesh-net]
    ports:
      - "8848:8848" # HTTP / 客户端
      - "9848:9848" # gRPC 客户端
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"  # 本地省事;线上必开
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-anVkZ2VtZXNoLWxvY2FsLW5hY29zLWF1dGgtdG9rZW4tMzItYnl0ZXM=}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-judgemesh}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-judgemesh-local}
      JVM_XMS: 256m
      JVM_XMX: 512m
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/operator/metrics"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
