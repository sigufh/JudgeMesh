# Experiment 1: kill one judge-worker every five minutes.
# Verify: deployment recreates the pod, oj_worker_up returns to 3, and queued
# submissions continue to drain.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-worker
  namespace: chaos-mesh
  labels:
    app.kubernetes.io/part-of: judgemesh
    chaos.judgemesh.io/scenario: worker-self-healing
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces: [judgemesh]
    labelSelectors:
      app: judge-worker
  duration: "30s"
  scheduler:
    cron: "@every 5m"
