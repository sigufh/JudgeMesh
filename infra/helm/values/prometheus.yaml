# kube-prometheus-stack values
# helm install prom prometheus-community/kube-prometheus-stack \
#   -n judgemesh-observe --create-namespace -f infra/helm/values/prometheus.yaml

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests: { cpu: 200m, memory: 512Mi }
  additionalServiceMonitors:
    - name: rabbitmq
      namespaceSelector:
        matchNames: ["judgemesh-infra"]
      selector:
        matchLabels:
          app: rabbitmq
      endpoints:
        - port: prom
          interval: 15s
    - name: etcd
      namespaceSelector:
        matchNames: ["judgemesh-infra"]
      selector:
        matchLabels:
          app: etcd
      endpoints:
        - port: prom
          interval: 15s

grafana:
  enabled: true
  adminPassword: changeme
  defaultDashboardsEnabled: true
  # 4 JudgeMesh dashboards are loaded from labeled ConfigMaps.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true
  persistence:
    enabled: true
    size: 10Gi

alertmanager:
  enabled: true
  config:
    receivers:
      - name: webhook
        # webhook_configs:
        #   - url: https://oapi.dingtalk.com/robot/send?access_token=...
