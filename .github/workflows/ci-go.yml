name: ci-go

on:
  push:
    branches: [main]
    paths:
      - 'services/judge-worker/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    paths:
      - 'services/judge-worker/**'
      - '.github/workflows/ci-go.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/judge-worker
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/judge-worker/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.txt ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: services/judge-worker
